server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # ── React Router — always fall back to index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # docker-compose : backend is reachable at http://backend:3001
    # Kubernetes     : Ingress routes /api to the backend Service BEFORE traffic
    #                  ever reaches this nginx pod, so this block is never hit.
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                always;
    add_header X-Content-Type-Options "nosniff"                   always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;
}
