# ──────────────────────────────────────────────────────────────────────────────
#  Backend Deployment
#
#  Image placeholders (replaced by CI/CD with sed):
#    __ACR_LOGIN_SERVER__  →  e.g. acrshopeaseprod.azurecr.io
#    __IMAGE_TAG__         →  git commit SHA (e.g. a1b2c3d)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopease-backend
  namespace: shopease
  labels:
    app: shopease-backend
spec:
  replicas: 1                  # SQLite PVC is ReadWriteOnce — single replica only
  selector:
    matchLabels:
      app: shopease-backend
  strategy:
    type: Recreate             # Required because PVC is ReadWriteOnce
  template:
    metadata:
      labels:
        app: shopease-backend
    spec:
      containers:
        - name: backend
          image: __ACR_LOGIN_SERVER__/shopease-backend:__IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
          volumeMounts:
            - name: sqlite-storage
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: sqlite-storage
          persistentVolumeClaim:
            claimName: sqlite-pvc
