# Nginx config for Kubernetes — overrides the baked-in docker-compose config.
# In k8s the Ingress already routes /api to the backend Service, so
# the proxy_pass block below is a safety fallback (rarely hit in practice).
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: shopease
data:
  default.conf: |
    server {
        listen      80;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass         http://shopease-backend.shopease.svc.cluster.local:3001;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        add_header X-Frame-Options        "SAMEORIGIN"                always;
        add_header X-Content-Type-Options "nosniff"                   always;

        gzip            on;
        gzip_vary       on;
        gzip_min_length 1024;
        gzip_types      text/plain text/css application/json application/javascript;
    }
