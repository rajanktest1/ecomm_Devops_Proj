# ──────────────────────────────────────────────────────────────────────────────
#  CI — Continuous Integration
#  Runs on every push and pull request targeting main.
#  Validates that both Docker images build successfully.
# ──────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx for layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ───────────────────────────────────────────────────────
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: false          # Build only — push happens in CD
          tags: shopease-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ──────────────────────────────────────────────────────
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: false
          tags: shopease-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Smoke test: start containers and call /api/health ───────────────────
      - name: Smoke test backend
        run: |
          docker run -d --name backend-test \
            -e NODE_ENV=production -e PORT=3001 \
            -p 3001:3001 shopease-backend:ci
          # Wait for the process to start
          sleep 5
          curl --fail --retry 5 --retry-delay 2 http://localhost:3001/api/health
          docker stop backend-test
