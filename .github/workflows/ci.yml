# ──────────────────────────────────────────────────────────────────────────────
#  CI — Continuous Integration
#  Runs on every push and pull request targeting main.
#  Validates that both Docker images build successfully.
# ──────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx for layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ───────────────────────────────────────────────────────
      # load: true exports the image to the local Docker daemon so the smoke
      # test step can reference it by name. Without this, BuildKit keeps the
      # image only in its own build cache and `docker run` cannot find it.
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: false
          load: true           # export to local Docker daemon for smoke test
          tags: shopease-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ──────────────────────────────────────────────────────
      # Frontend is static — no smoke test needed, so load: false is fine.
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: false
          tags: shopease-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Smoke test: start container and call /api/health ────────────────────
      - name: Smoke test backend
        run: |
          docker run -d --name backend-test \
            -e NODE_ENV=production -e PORT=3001 \
            -p 3001:3001 shopease-backend:ci
          # --retry-connrefused retries when the port is not yet open;
          # --retry-delay waits between attempts; --max-time caps each attempt.
          curl --fail \
               --retry 10 \
               --retry-delay 2 \
               --retry-connrefused \
               --max-time 5 \
               http://localhost:3001/api/health
          docker stop backend-test
          docker rm backend-test
